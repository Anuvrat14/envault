{% extends "base.html" %}
{% block title %}Unlock — Envault{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon mb-4">
            <i class="fas fa-lock"></i>
        </div>
        <h4 class="text-center mb-1">Vault Locked</h4>
        <p class="text-muted text-center mb-4" style="font-size:.9rem;">
            Enter your master password to unlock.
        </p>

        {% if error %}
        <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.875rem;">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="form-label">Master Password</label>
                <input type="password" class="form-control vault-input" name="password"
                       placeholder="Enter master password" autocomplete="current-password"
                       autofocus required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-unlock me-2"></i>Unlock
            </button>
        </form>

        <div class="d-flex justify-content-between mt-4" style="border-top:1px solid rgba(255,255,255,.07); padding-top:1rem;">
            <a href="{{ url_for('auth.reset') }}"
               style="font-size:.78rem; color:rgba(255,255,255,.35); text-decoration:none;"
               onmouseover="this.style.color='rgba(231,76,60,.7)'"
               onmouseout="this.style.color='rgba(255,255,255,.35)'">
                <i class="fas fa-triangle-exclamation me-1"></i>Forgot password
            </a>
            <a href="{{ url_for('auth.unlock_with_code') }}"
               style="font-size:.78rem; color:rgba(255,255,255,.35); text-decoration:none;"
               onmouseover="this.style.color='rgba(255,255,255,.65)'"
               onmouseout="this.style.color='rgba(255,255,255,.35)'">
                <i class="fas fa-shield-halved me-1"></i>Use backup code
            </a>
        </div>
    </div>
</div>
{% endblock %}
