name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Flask server binary
        run: |
          venv\Scripts\activate
          pyinstaller envault_windows.spec --noconfirm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List dist folder
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $installer = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*envault-server*" } | Select-Object -First 1 -ExpandProperty FullName
          $yml = "dist\latest.yml"
          Write-Host "Installer: $installer"
          Write-Host "YML: $yml"
          gh release upload $tag "$installer" $yml --clobber
