name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Flask server binary
        run: |
          venv\Scripts\activate
          pyinstaller dotward_windows.spec --noconfirm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List dist folder
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = $tag.TrimStart('v')
          $installerName = "Dotward-Setup-$version.exe"

          # Patch package.json so electron-builder names the exe correctly
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

          # Find and rename installer
          $src = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*dotward-server*" } | Select-Object -First 1 -ExpandProperty FullName
          $dest = "dist\$installerName"
          Copy-Item $src $dest
          Write-Host "Installer: $dest"

          # Create release if it doesn't exist
          $releaseCheck = gh api repos/Anuvrat14/dotward/releases/tags/$tag 2>$null | ConvertFrom-Json
          if (-not $releaseCheck.id) {
            gh release create $tag --title "Dotward $tag" --notes "Dotward $tag"
            Write-Host "Created release $tag"
          }

          # Delete existing assets via API to avoid 403 on clobber
          $releaseId = (gh api repos/Anuvrat14/dotward/releases/tags/$tag | ConvertFrom-Json).id
          $assets = gh api repos/Anuvrat14/dotward/releases/$releaseId/assets | ConvertFrom-Json
          foreach ($asset in $assets) {
            if ($asset.name -eq $installerName -or $asset.name -eq "latest.yml") {
              gh api repos/Anuvrat14/dotward/releases/assets/$($asset.id) -X DELETE
              Write-Host "Deleted existing asset: $($asset.name)"
            }
          }

          Write-Host "Uploading $installerName..."
          gh release upload $tag $dest

          Write-Host "Uploading latest.yml..."
          gh release upload $tag dist\latest.yml

          Write-Host "Done."
