name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Flask server binary
        run: |
          venv\Scripts\activate
          pyinstaller dotward_windows.spec --noconfirm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List dist folder
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installerName = "Dotward-Setup-$version.exe"

          # Find and rename installer (removes spaces)
          $src = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*dotward-server*" } | Select-Object -First 1 -ExpandProperty FullName
          $dest = "dist\$installerName"
          Copy-Item $src $dest
          Write-Host "Installer: $dest"

          # Delete existing assets so re-runs don't fail
          gh release delete-asset $tag $installerName --yes 2>$null
          gh release delete-asset $tag "latest.yml" --yes 2>$null

          # Upload using gh (most reliable, handles auth automatically)
          Write-Host "Uploading $installerName..."
          gh release upload $tag $dest --clobber

          Write-Host "Uploading latest.yml..."
          gh release upload $tag dist\latest.yml --clobber

          Write-Host "Done."
