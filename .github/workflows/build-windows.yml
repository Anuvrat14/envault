name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Flask server binary
        run: |
          venv\Scripts\activate
          pyinstaller dotward_windows.spec --noconfirm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List dist folder
        shell: pwsh
        run: Get-ChildItem dist | Format-Table Name, Length

      - name: Upload Windows artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }

          # Read version from package.json dynamically
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installerName = "Dotward-Setup-$version.exe"

          # Find and rename installer (removes spaces)
          $src = Get-ChildItem dist -Filter "*.exe" | Where-Object { $_.Name -notlike "*dotward-server*" } | Select-Object -First 1 -ExpandProperty FullName
          $dest = "dist\$installerName"
          Copy-Item $src $dest
          Write-Host "Installer: $dest"

          # Get release info
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/Anuvrat14/dotward/releases/tags/$tag" -Headers $headers
          $uploadBase = $release.upload_url -replace '\{\?name,label\}', ''

          # Delete existing assets with same names so re-runs don't fail with 422
          foreach ($asset in $release.assets) {
            if ($asset.name -eq $installerName -or $asset.name -eq "latest.yml") {
              Write-Host "Deleting existing asset: $($asset.name)"
              Invoke-RestMethod -Uri "https://api.github.com/repos/Anuvrat14/dotward/releases/assets/$($asset.id)" -Method Delete -Headers $headers
            }
          }

          # Upload installer
          Write-Host "Uploading $installerName..."
          $r1 = curl.exe --fail -w "`nHTTP_STATUS:%{http_code}" -X POST "${uploadBase}?name=$installerName" `
            -H "Authorization: Bearer $env:GH_TOKEN" `
            -H "Content-Type: application/octet-stream" `
            --data-binary "@$dest"
          Write-Host $r1
          if ($LASTEXITCODE -ne 0) { throw "Installer upload failed" }

          # Upload latest.yml
          Write-Host "Uploading latest.yml..."
          $r2 = curl.exe --fail -w "`nHTTP_STATUS:%{http_code}" -X POST "${uploadBase}?name=latest.yml" `
            -H "Authorization: Bearer $env:GH_TOKEN" `
            -H "Content-Type: text/yaml" `
            --data-binary "@dist\latest.yml"
          Write-Host $r2
          if ($LASTEXITCODE -ne 0) { throw "latest.yml upload failed" }

          Write-Host "Done."
